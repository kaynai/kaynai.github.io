<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1111</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
    <style>
        :root { --primary: #ff7b92; --text: #4a4a4a; --text-light: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .post-header { margin-bottom: 30px; }
        .post-category {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--primary);
            background: #ffe4e9;
            padding: 2px 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .post-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 15px; }
        .post-meta { color: var(--text-light); font-size: 0.9rem; }
        .post-meta span { margin-right: 15px; }
        .post-content { margin-top: 30px; }
        .post-content h1, .post-content h2, .post-content h3 { margin: 1.5em 0 0.8em; }
        .post-content p { margin-bottom: 1em; }
        .post-content pre { background: #f5f5f5; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .post-content code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; }
        .post-content img { max-width: 100%; border-radius: 8px; }
        .post-tags { margin-top: 30px; display: flex; gap: 8px; flex-wrap: wrap; }
        .post-tags a {
            font-size: 0.8rem;
            color: var(--text-light);
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 15px;
            text-decoration: none;
        }
        .back-link { display: inline-block; margin-top: 40px; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <article>
        <header class="post-header">
            <span class="post-category">1111</span>
            <h1 class="post-title">1111</h1>
            <div class="post-meta">
                <span><i class="far fa-calendar"></i> 2026-03-18</span>
            </div>
        </header>
        <div class="post-content"><p>1111</p>
</div>
        
    </article>
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
</body>
</html>
