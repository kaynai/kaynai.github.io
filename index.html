<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小窝</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
    <style>
        :root {
            --primary: #ff9eb5;
            --secondary: #b8e0ff;
            --accent: #ffd1dc;
            --text: #5a5a5a;
            --bg: #fff9fb;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }
        
        /* 导航 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(255,158,181,0.2);
        }
        nav ul {
            display: flex;
            justify-content: center;
            gap: 30px;
            list-style: none;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--primary);
        }
        
        /* 主区域 */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 300;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.1rem;
            color: #888;
            max-width: 500px;
        }
        .hero .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            box-shadow: 0 10px 40px rgba(255,158,181,0.3);
        }
        
        /* 区块 */
        section {
            padding: 80px 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        section h2 {
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
        }
        
        /* 关于 */
        .about-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.05);
        }
        .about-content p {
            margin-bottom: 15px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-item i {
            color: var(--primary);
            width: 20px;
        }
        
        /* 博客列表 */
        .posts-grid {
            display: grid;
            gap: 20px;
        }
        .post-card {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,158,181,0.2);
        }
        .post-card h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .post-card h3 a {
            color: var(--text);
            text-decoration: none;
        }
        .post-card h3 a:hover {
            color: var(--primary);
        }
        .post-card .meta {
            font-size: 0.85rem;
            color: #aaa;
        }
        
        /* 友链 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .link-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .link-card:hover {
            transform: translateY(-3px);
        }
        .link-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .link-card h4 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .link-card p {
            font-size: 0.85rem;
            color: #888;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: white;
            margin-top: 40px;
        }
        footer p {
            font-size: 0.9rem;
            color: #aaa;
        }
        footer .social {
            margin-bottom: 15px;
        }
        footer .social a {
            color: var(--primary);
            font-size: 1.5rem;
            margin: 0 10px;
            transition: transform 0.3s;
        }
        footer .social a:hover {
            transform: scale(1.2);
        }
        
        /* 管理入口 */
        .admin-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(255,158,181,0.4);
            transition: transform 0.3s;
        }
        .admin-link:hover {
            transform: scale(1.1);
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            nav ul {
                gap: 15px;
                font-size: 0.85rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
            section {
                padding: 50px 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">首页</a></li>
            <li><a href="#about">关于</a></li>
            <li><a href="#blog">博客</a></li>
            <li><a href="#links">友链</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="avatar">🌸</div>
        <h1>我的小窝</h1>
        <p>欢迎来到我的个人空间，这里记录着生活与思考的点滴 ✨</p>
    </section>

    <section id="about">
        <h2>关于我</h2>
        <div class="about-content">
            <p>你好呀～欢迎来到我的小窝！(◕‿◕)</p>
            <p>这里是一个热爱生活、喜欢折腾的人，偶尔写写代码，偶尔发发呆。</p>
            <div class="info-grid">
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>中国</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-heart"></i>
                    <span>编程、阅读</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-code"></i>
                    <span>全栈开发</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-coffee"></i>
                    <span>咖啡爱好者</span>
                </div>
            </div>
        </div>
    </section>

    <section id="blog">
        <h2>博客文章</h2>
        <div class="posts-grid" id="postsContainer">
            <article class="post-card">
                <h3><a href="/posts/hello-world.html">Hello World</a></h3>
                <p class="meta">2026-03-19</p>
            </article>
        </div>
    </section>

    <section id="links">
        <h2>友情链接</h2>
        <div class="links-grid">
            <a href="https://github.com/kaynai" target="_blank" class="link-card">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=github" alt="GitHub">
                <h4>GitHub</h4>
                <p>我的代码仓库</p>
            </a>
        </div>
    </section>

    <footer>
        <div class="social">
            <a href="https://github.com/kaynai" target="_blank"><i class="fab fa-github"></i></a>
        </div>
        <p>© 2026 我的小窝 · Powered by GitHub Pages</p>
        <p style="margin-top: 10px; font-size: 0.8rem;">
            已运行 <span id="runtime">0</span> 天
        </p>
    </footer>

    <a href="/admin/" class="admin-link" title="管理后台">
        <i class="fas fa-cog"></i>
    </a>

    <script>
        // 计算运行时间
        const startDate = new Date('2026-03-19');
        const runtime = Math.floor((Date.now() - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('runtime').textContent = runtime;
    </script>
</body>
</html>
